# =============================================================================
# PerPilot — Six AI Agent Pipeline (End-to-End Load Testing)
# =============================================================================
# AGENT 01: Target Application  — Validates URL + gathers context
# AGENT 02: NFR Gathering       — Sets perf thresholds by environment
# AGENT 03: Workload Design     — Designs scenarios, VUs, duration
# AGENT 04: Script Generation   — Generates k6 load test script
# AGENT 05: Load Test Execution — Installs k6, runs test, parses metrics
# AGENT 06: Store Results       — Publishes report to GitHub
# =============================================================================
name: "PerPilot | Six AI Agents — E2E Load Testing"
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "[Agent 01] Target application URL"
        required: true
        default: "https://jsonplaceholder.typicode.com"
      environment:
        description: "[Agent 02] Environment (sets NFR thresholds)"
        required: true
        default: "staging"
        type: choice
        options: [development, staging, production, sandbox]
      virtual_users:
        description: "[Agent 03] Number of concurrent virtual users"
        required: true
        default: "10"
      duration:
        description: "[Agent 03] Test duration (1m, 5m, 10m, 30m)"
        required: true
        default: "5m"
env:
  TARGET_URL:  ${{ inputs.target_url   }}
  ENVIRONMENT: ${{ inputs.environment  }}
  VUS:         ${{ inputs.virtual_users}}
  DURATION:    ${{ inputs.duration     }}
jobs:
  agent-01-target-application:
    name: "Agent 01 | Target Application"
    runs-on: ubuntu-latest
    outputs:
      target_url:  ${{ steps.a01.outputs.target_url  }}
      environment: ${{ steps.a01.outputs.environment }}
      http_status: ${{ steps.a01.outputs.http_status }}
      reachable:   ${{ steps.a01.outputs.reachable   }}
      api_style:   ${{ steps.a01.outputs.api_style   }}
    steps:
      - name: "[A01] Validate Target Application"
        id: a01
        run: |
          echo ""
          echo "AGENT 01 - TARGET APPLICATION"
          echo "PROMPT: Validate URL via HTTP check, extract metadata, output context to Agent 02"
          echo "INPUT: url=${{ env.TARGET_URL }} env=${{ env.ENVIRONMENT }}"
          RESP=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 "${{ env.TARGET_URL }}" || echo "000")
          [ "$RESP" = "000" ] && REACHABLE=false || REACHABLE=true
          CT=$(curl -sI --max-time 10 "${{ env.TARGET_URL }}" | grep -i content-type | head -1 || echo '')
          echo "$CT" | grep -qi json && API=REST || API=HTML
          echo "OUTPUT: HTTP=$RESP Reachable=$REACHABLE API=$API"
          echo "target_url=${{ env.TARGET_URL }}"  >> $GITHUB_OUTPUT
          echo "environment=${{ env.ENVIRONMENT }}" >> $GITHUB_OUTPUT
          echo "http_status=$RESP"    >> $GITHUB_OUTPUT
          echo "reachable=$REACHABLE" >> $GITHUB_OUTPUT
          echo "api_style=$API"       >> $GITHUB_OUTPUT
          echo "Agent 01 COMPLETE"
          [ "$REACHABLE" = false ] && { echo "FAILED: Target unreachable"; exit 1; } || true
  agent-02-nfr-gathering:
    name: "Agent 02 | NFR Gathering"
    runs-on: ubuntu-latest
    needs: agent-01-target-application
    outputs:
      p95_ms:      ${{ steps.a02.outputs.p95_ms      }}
      p99_ms:      ${{ steps.a02.outputs.p99_ms      }}
      error_rate:  ${{ steps.a02.outputs.error_rate  }}
      throughput:  ${{ steps.a02.outputs.throughput  }}
      nfr_profile: ${{ steps.a02.outputs.nfr_profile }}
    steps:
      - name: "[A02] Generate NFR Requirements"
        id: a02
        run: |
          echo ""
          echo "AGENT 02 - NFR GATHERING"
          echo "PROMPT: Select threshold profile by environment, output p95/p99/error/throughput NFRs"
          echo "INPUT from A01: environment=${{ needs.agent-01-target-application.outputs.environment }}"
          ENV="${{ needs.agent-01-target-application.outputs.environment }}"
          case "$ENV" in
            production)  P95=1000;  P99=1500;  ERR=0.005; TPUT=200; PRF=production;;
            staging)     P95=2000;  P99=3000;  ERR=0.01;  TPUT=100; PRF=staging;;
            development) P95=5000;  P99=8000;  ERR=0.05;  TPUT=20;  PRF=development;;
            sandbox)     P95=10000; P99=15000; ERR=0.10;  TPUT=5;   PRF=sandbox;;
            *)           P95=2000;  P99=3000;  ERR=0.01;  TPUT=50;  PRF=custom;;
          esac
          echo "OUTPUT: profile=$PRF p95<${P95}ms p99<${P99}ms err<${ERR} tput>=${TPUT}"
          echo "p95_ms=$P95"        >> $GITHUB_OUTPUT
          echo "p99_ms=$P99"        >> $GITHUB_OUTPUT
          echo "error_rate=$ERR"    >> $GITHUB_OUTPUT
          echo "throughput=$TPUT"   >> $GITHUB_OUTPUT
          echo "nfr_profile=$PRF"   >> $GITHUB_OUTPUT
          echo "Agent 02 COMPLETE"
  agent-03-workload-design:
    name: "Agent 03 | Workload Design"
    runs-on: ubuntu-latest
    needs: [agent-01-target-application, agent-02-nfr-gathering]
    outputs:
      test_type:    ${{ steps.a03.outputs.test_type    }}
      virtual_users:${{ steps.a03.outputs.virtual_users}}
      duration:     ${{ steps.a03.outputs.duration     }}
      ramp_up:      ${{ steps.a03.outputs.ramp_up      }}
      est_requests: ${{ steps.a03.outputs.est_requests }}
    steps:
      - name: "[A03] Design Workload Scenarios"
        id: a03
        run: |
          echo ""
          echo "AGENT 03 - WORKLOAD DESIGN"
          echo "PROMPT: Classify test type by VU count, compute ramp-up, design 3 weighted scenarios"
          echo "INPUT: VUs=${{ env.VUS }} Duration=${{ env.DURATION }} p95=${{ needs.agent-02-nfr-gathering.outputs.p95_ms }}ms"
          VUS=${{ env.VUS }}; DUR="${{ env.DURATION }}"
          if [ "$VUS" -le 5 ]; then TYPE=smoke
          elif [ "$VUS" -le 50 ]; then TYPE=load
          elif [ "$VUS" -le 200 ]; then TYPE=stress
          else TYPE=spike; fi
          DN=$(echo $DUR | sed 's/m//'); DS=$((DN*60))
          RU=$((DS/10)); [ "$RU" -lt 10 ] && RU=10
          EST=$((VUS*DS/2))
          echo "OUTPUT: type=$TYPE VUs=$VUS ramp=${RU}s est_reqs=${EST}"
          echo "Scenarios: A(50% GET Browse) B(30% Journey) C(20% CRUD)"
          echo "test_type=$TYPE"       >> $GITHUB_OUTPUT
          echo "virtual_users=$VUS"    >> $GITHUB_OUTPUT
          echo "duration=$DUR"         >> $GITHUB_OUTPUT
          echo "ramp_up=$RU"           >> $GITHUB_OUTPUT
          echo "est_requests=$EST"     >> $GITHUB_OUTPUT
          echo "Agent 03 COMPLETE"
  agent-04-script-generation:
    name: "Agent 04 | Script Generation"
    runs-on: ubuntu-latest
    needs: [agent-01-target-application, agent-02-nfr-gathering, agent-03-workload-design]
    steps:
      - name: "[A04] Generate k6 Load Test Script"
        run: |
          echo ""
          echo "AGENT 04 - SCRIPT GENERATION"
          echo "PROMPT: Using URL(A01)+NFRs(A02)+workload(A03), generate complete k6 JS script"
          echo "        with 3 scenarios, threshold options, ramp-up stages, error tracking"
          echo "INPUT: url=${{ needs.agent-01-target-application.outputs.target_url }}"
          mkdir -p scripts
          {
            printf '// PerPilot - AI Generated k6 Script (Agent 04)\n'
            printf '// Target  : %s\n' '${{ needs.agent-01-target-application.outputs.target_url }}'
            printf '// Profile : %s\n' '${{ needs.agent-02-nfr-gathering.outputs.nfr_profile }}'
            printf '// Type    : %s\n' '${{ needs.agent-03-workload-design.outputs.test_type }}'
            printf 'import http from "k6/http";\n'
            printf 'import { check, sleep, group } from "k6";\n'
            printf 'import { Rate, Trend, Counter } from "k6/metrics";\n'
            printf 'const errorRate = new Rate("errors");\n'
            printf 'const respTime  = new Trend("response_time");\n'
            printf 'const reqCount  = new Counter("total_requests");\n'
            printf 'export const options = {\n'
            printf '  stages: [\n'
            printf '    { duration: "%ss", target: %s },\n' '${{ needs.agent-03-workload-design.outputs.ramp_up }}' '${{ needs.agent-03-workload-design.outputs.virtual_users }}'
            printf '    { duration: "%s",  target: %s },\n' '${{ needs.agent-03-workload-design.outputs.duration }}' '${{ needs.agent-03-workload-design.outputs.virtual_users }}'
            printf '    { duration: "15s", target: 0 },\n'
            printf '  ],\n'
            printf '  thresholds: {\n'
            printf '    http_req_duration: ["p(95)<%s","p(99)<%s"],\n' '${{ needs.agent-02-nfr-gathering.outputs.p95_ms }}' '${{ needs.agent-02-nfr-gathering.outputs.p99_ms }}'
            printf '    errors:    ["rate<%s"],\n' '${{ needs.agent-02-nfr-gathering.outputs.error_rate }}'
            printf '    http_reqs: ["rate>=%s"],\n' '${{ needs.agent-02-nfr-gathering.outputs.throughput }}'
            printf '  },\n'
            printf '};\n'
            printf 'const BASE = "%s";\n' '${{ needs.agent-01-target-application.outputs.target_url }}'
            printf 'export default function () {\n'
            printf '  const r = Math.random();\n'
            printf '  if (r < 0.50) {\n'
            printf '    group("A:Browse", () => {\n'
            printf '      const res = http.get(`${BASE}/posts`);\n'
            printf '      const ok = check(res,{"s200":(r)=>r.status===200});\n'
            printf '      errorRate.add(!ok);respTime.add(res.timings.duration);reqCount.add(1);\n'
            printf '    });\n'
            printf '  } else if (r < 0.80) {\n'
            printf '    group("B:Journey", () => {\n'
            printf '      const id=Math.floor(Math.random()*100)+1;\n'
            printf '      const r1=http.get(`${BASE}/posts/${id}`);\n'
            printf '      check(r1,{"s200":(r)=>r.status===200});\n'
            printf '      const r2=http.post(`${BASE}/posts`,\n'
            printf '        JSON.stringify({title:"PerPilot",body:"AI test",userId:1}),\n'
            printf '        {headers:{"Content-Type":"application/json"}});\n'
            printf '      const ok=check(r2,{"s201":(r)=>r.status===201});\n'
            printf '      errorRate.add(!ok);respTime.add(r1.timings.duration);reqCount.add(2);\n'
            printf '      sleep(1);\n'
            printf '    });\n'
            printf '  } else {\n'
            printf '    group("C:CRUD", () => {\n'
            printf '      const id=Math.floor(Math.random()*10)+1;\n'
            printf '      const r1=http.put(`${BASE}/posts/${id}`,\n'
            printf '        JSON.stringify({title:"Updated",body:"test",userId:1}),\n'
            printf '        {headers:{"Content-Type":"application/json"}});\n'
            printf '      const r2=http.del(`${BASE}/posts/${id}`);\n'
            printf '      const ok=check(r1,{"put200":(r)=>r.status===200})&&\n'
            printf '               check(r2,{"del200":(r)=>r.status===200});\n'
            printf '      errorRate.add(!ok);respTime.add(r1.timings.duration);reqCount.add(2);\n'
            printf '    });\n'
            printf '  }\n'
            printf '  sleep(1);\n'
            printf '}\n'
          } > scripts/load-test-script.js
          echo "OUTPUT: Script generated ($(wc -l < scripts/load-test-script.js) lines)"
          echo "Agent 04 COMPLETE"
      - name: "Upload Script"
        uses: actions/upload-artifact@v4
        with:
          name: a04-script
          path: scripts/
  agent-05-execution:
    name: "Agent 05 | Load Test Execution"
    runs-on: ubuntu-latest
    needs: [agent-02-nfr-gathering, agent-03-workload-design, agent-04-script-generation]
    outputs:
      test_status:  ${{ steps.a05.outputs.test_status  }}
      p95_actual:   ${{ steps.a05.outputs.p95_actual   }}
      p99_actual:   ${{ steps.a05.outputs.p99_actual   }}
      error_actual: ${{ steps.a05.outputs.error_actual }}
      rps_actual:   ${{ steps.a05.outputs.rps_actual   }}
      total_reqs:   ${{ steps.a05.outputs.total_reqs   }}
    steps:
      - name: "[A05] Install k6"
        run: |
          echo "AGENT 05 - LOAD TEST EXECUTION"
          echo "PROMPT: Install k6, run script from A04, parse JSON metrics, compare to A02 NFRs"
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69 2>/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main' \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install -y k6 -qq
          echo "k6 installed"
      - name: "[A05] Download Script"
        uses: actions/download-artifact@v4
        with:
          name: a04-script
          path: scripts/
      - name: "[A05] Execute Test"
        run: |
          echo "Running: ${{ needs.agent-03-workload-design.outputs.test_type }} ${{ needs.agent-03-workload-design.outputs.virtual_users }} VUs for ${{ needs.agent-03-workload-design.outputs.duration }}"
          mkdir -p results
          k6 run --out json=results/k6-results.json scripts/load-test-script.js 2>&1 | tee results/k6-console.log || true
          echo "Execution complete"
      - name: "[A05] Parse Metrics"
        id: a05
        run: |
          P95=0; P99=0; ERR=0; RPS=0; TOTAL=0
          if [ -f results/k6-results.json ]; then
            P95=$(grep '"p(95)"' results/k6-results.json | grep -oP '"value":\s*\K[0-9.]+' | head -1 || echo 0)
            P99=$(grep '"p(99)"' results/k6-results.json | grep -oP '"value":\s*\K[0-9.]+' | head -1 || echo 0)
            ERR=$(grep '"http_req_failed"' results/k6-results.json | grep '"rate"' | grep -oP '"value":\s*\K[0-9.]+' | head -1 || echo 0)
            RPS=$(grep '"http_reqs"' results/k6-results.json | grep '"rate"' | grep -oP '"value":\s*\K[0-9.]+' | head -1 || echo 0)
            TOTAL=$(grep '"http_reqs"' results/k6-results.json | grep '"count"' | grep -oP '"value":\s*\K[0-9.]+' | head -1 || echo 0)
          fi
          P95I=$(printf '%.0f' ${P95:-0}); P99I=$(printf '%.0f' ${P99:-0})
          RPSI=$(printf '%.1f' ${RPS:-0}); ERPP=$(echo "${ERR:-0}*100" | bc -l | xargs printf '%.2f')
          TOTI=$(printf '%.0f' ${TOTAL:-0})
          THR=${{ needs.agent-02-nfr-gathering.outputs.p95_ms }}
          STATUS=PASS
          [ "$P95I" -gt "$THR" ] 2>/dev/null && STATUS=FAIL
          ERF=$(echo "${ERR:-0} > ${{ needs.agent-02-nfr-gathering.outputs.error_rate }}" | bc -l || echo 0)
          [ "$ERF" = "1" ] && STATUS=FAIL
          echo "RESULTS: p95=${P95I}ms p99=${P99I}ms err=${ERPP}% rps=${RPSI} total=${TOTI} STATUS=$STATUS"
          echo "test_status=$STATUS"  >> $GITHUB_OUTPUT
          echo "p95_actual=$P95I"     >> $GITHUB_OUTPUT
          echo "p99_actual=$P99I"     >> $GITHUB_OUTPUT
          echo "error_actual=$ERPP"   >> $GITHUB_OUTPUT
          echo "rps_actual=$RPSI"     >> $GITHUB_OUTPUT
          echo "total_reqs=$TOTI"     >> $GITHUB_OUTPUT
          echo "Agent 05 COMPLETE"
      - name: "Upload Results"
        uses: actions/upload-artifact@v4
        with:
          name: a05-results
          path: results/
  agent-06-store-results:
    name: "Agent 06 | Store Results to GitHub"
    runs-on: ubuntu-latest
    needs:
      - agent-01-target-application
      - agent-02-nfr-gathering
      - agent-03-workload-design
      - agent-04-script-generation
      - agent-05-execution
    if: always()
    steps:
      - name: "[A06] Download Results"
        uses: actions/download-artifact@v4
        with:
          name: a05-results
          path: results/
        continue-on-error: true
      - name: "[A06] Publish GitHub Step Summary"
        run: |
          echo "AGENT 06 - STORE RESULTS TO GITHUB"
          echo "PROMPT: Format all A01-A05 outputs into Markdown report, publish Step Summary, upload artifacts"
          S="${{ needs.agent-05-execution.outputs.test_status }}"
          [ "$S" = PASS ] && VRD="PASS" || VRD="FAIL"
          cat >> $GITHUB_STEP_SUMMARY << 'HDOC'
          # PerPilot Six AI Agents - Load Test Report
          HDOC
          cat >> $GITHUB_STEP_SUMMARY << ENDDOC
          Run: ${{ github.run_number }} | Verdict: ${VRD}
          ## Six AI Agent Pipeline Status
          | Agent | Role | Status |
          |-------|------|--------|
          | 01 Target Application | Validate URL + context | done |
          | 02 NFR Gathering | Set perf thresholds | done |
          | 03 Workload Design | Design scenarios | done |
          | 04 Script Generation | Generate k6 script | done |
          | 05 Load Test Execution | Run test + parse metrics | done |
          | 06 Store Results | Publish report | done |
          ## Test Configuration
          | Parameter | Value |
          |-----------|-------|
          | Target URL | ${{ needs.agent-01-target-application.outputs.target_url }} |
          | Environment | ${{ needs.agent-01-target-application.outputs.environment }} |
          | Virtual Users | ${{ needs.agent-03-workload-design.outputs.virtual_users }} |
          | Duration | ${{ needs.agent-03-workload-design.outputs.duration }} |
          | Test Type | ${{ needs.agent-03-workload-design.outputs.test_type }} |
          | NFR Profile | ${{ needs.agent-02-nfr-gathering.outputs.nfr_profile }} |
          ## NFR Thresholds vs Actual Results
          | Metric | Threshold | Actual |
          |--------|-----------|--------|
          | P95 Response | <${{ needs.agent-02-nfr-gathering.outputs.p95_ms }}ms | ${{ needs.agent-05-execution.outputs.p95_actual }}ms |
          | P99 Response | <${{ needs.agent-02-nfr-gathering.outputs.p99_ms }}ms | ${{ needs.agent-05-execution.outputs.p99_actual }}ms |
          | Error Rate | <${{ needs.agent-02-nfr-gathering.outputs.error_rate }} | ${{ needs.agent-05-execution.outputs.error_actual }}% |
          | Throughput | >=${{ needs.agent-02-nfr-gathering.outputs.throughput }}/s | ${{ needs.agent-05-execution.outputs.rps_actual }} req/s |
          | Total Requests | ~${{ needs.agent-03-workload-design.outputs.est_requests }} | ${{ needs.agent-05-execution.outputs.total_reqs }} |
          ## Verdict: ${VRD}
          > PerPilot Six AI Agents | github.com/jaisaim/perpilot-load-testing-template
          ENDDOC
          echo "Pipeline Summary:"
          echo "  A01: URL validated"
          echo "  A02: NFRs set (${{ needs.agent-02-nfr-gathering.outputs.nfr_profile }} profile)"
          echo "  A03: Workload designed (${{ needs.agent-03-workload-design.outputs.test_type }} ${{ needs.agent-03-workload-design.outputs.virtual_users }} VUs ${{ needs.agent-03-workload-design.outputs.duration }})"
          echo "  A04: k6 script generated"
          echo "  A05: p95=${{ needs.agent-05-execution.outputs.p95_actual }}ms err=${{ needs.agent-05-execution.outputs.error_actual }}% rps=${{ needs.agent-05-execution.outputs.rps_actual }}"
          echo "  A06: Results stored to GitHub"
          echo "  VERDICT: ${VRD}"
          echo "Agent 06 COMPLETE"
          [ "$S" = FAIL ] && exit 1 || exit 0
      - name: "Upload Final Report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a06-final-report
          path: results/
          retention-days: 30
